<!DOCTYPE html>
<html lang="pt-BR" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SCOPE3 - Análise Financeira{% endblock %}</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/static/images/favicon.svg">
    <link rel="alternate icon" href="/static/images/favicon.svg">
    <link rel="apple-touch-icon" href="/static/images/favicon.svg">


    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Heroicons -->
    <script src="https://cdn.jsdelivr.net/npm/heroicons@2.0.18/24/outline/index.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/custom.css">

    {% block head %}{% endblock %}

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#00FF9D',
                        secondary: '#00C8FF',
                        dark: {
                            900: '#0B0E11',
                            800: '#15191E',
                            700: '#1F2329'
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-dark-900 text-gray-100 min-h-screen flex flex-col">
    <div class="flex-1">
        {% block content %}{% endblock %}
    </div>

    <!-- Legal Footer included inside each page's scrollable area via components/legal_footer.html -->

    <!-- Plan Restrictions -->
    <script>
        window._userPlan = '{{ (user.plan_name or "Free") if user else "Free" }}';
        window._isFreePlan = (window._userPlan === 'Free');
    </script>
    <style>
        /* Hide elements for free plan users */
        body.plan-free .premium-only { display: none !important; }
        body.plan-free .premium-locked {
            opacity: 0.4;
            pointer-events: none;
            filter: grayscale(0.8);
        }
    </style>
    <script>
        if (window._isFreePlan) document.body.classList.add('plan-free');
    </script>

    <!-- Global Scripts -->
    <script src="/static/js/main.js"></script>
    {% block scripts %}{% endblock %}
</body>

</html>
